<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Vehicle (Mechanic)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-6 rounded shadow w-96">
    <h2 class="text-xl font-bold mb-4">Add Vehicle</h2>

    <input id="vehicleNumber" placeholder="Vehicle Number"
      class="w-full mb-3 p-2 border rounded">

    <input id="model" placeholder="Vehicle Model"
      class="w-full mb-3 p-2 border rounded">

    <input id="year" type="number" placeholder="Year"
      class="w-full mb-3 p-2 border rounded">

    <input id="mileage" type="number" placeholder="Mileage"
      class="w-full mb-4 p-2 border rounded">

    <button onclick="addVehicle()"
      class="w-full bg-blue-600 text-white py-2 rounded">
      Save Vehicle
    </button>
  </div>

  <script>
  async function addVehicle() {
    const token = localStorage.getItem("token");

    if (!token) {
      alert("Please login first");
      window.location.href = "login.html";
      return;
    }

    const response = await fetch("/api/vehicles", {
      method: "POST",
      headers: {
  "Content-Type": "application/json",
  "Authorization": "Bearer " + localStorage.getItem("token")
},

      body: JSON.stringify({
        vehicleNumber: document.getElementById("vehicleNumber").value,
        model: document.getElementById("model").value,
        year: document.getElementById("year").value,
        mileage: document.getElementById("mileage").value
      })
    });

    const data = await response.json();

    if (!response.ok) {
      alert(data.message || "Failed to add vehicle");
      return;
    }

    alert("Vehicle added successfully");
  }
</script>

</body>
</html>
