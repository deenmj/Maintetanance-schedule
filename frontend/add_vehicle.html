<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Vehicle — ABC Fleet Maintenance</title>
  <meta name="description" content="Register a new vehicle to the ABC Fleet Maintenance System" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
<div class="page-wrapper">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="navbar-logo">A</div>
      <div>
        <div class="navbar-title">ABC Fleet Maintenance</div>
        <div class="navbar-subtitle">Vehicle Registration</div>
      </div>
    </div>
    <div class="navbar-actions">
      <a href="mechanic-dashboard.html" class="btn btn-ghost">← Back to Dashboard</a>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="container" style="padding-top: 48px; max-width: 560px;">

    <div class="card animate-in">
      <div class="card-header">
        <div class="card-icon violet">🚗</div>
        <div>
          <div class="card-title">Register New Vehicle</div>
          <div class="card-description">Add a vehicle to the fleet maintenance system</div>
        </div>
      </div>

      <!-- Vehicle Number -->
      <div class="form-group">
        <label class="form-label" for="vehicleNumber">Vehicle Number</label>
        <input id="vehicleNumber" placeholder="e.g. BGT 2987" class="form-input" />
      </div>

      <!-- Model -->
      <div class="form-group">
        <label class="form-label" for="model">Vehicle Model</label>
        <input id="model" placeholder="e.g. Toyota Camry" class="form-input" />
      </div>

      <!-- Year & Mileage -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div class="form-group">
          <label class="form-label" for="year">Year</label>
          <input id="year" type="number" placeholder="e.g. 2022" class="form-input" />
        </div>
        <div class="form-group">
          <label class="form-label" for="mileage">Current Mileage (KM)</label>
          <input id="mileage" type="number" placeholder="e.g. 35000" class="form-input" />
        </div>
      </div>

      <!-- Owner Details -->
      <div style="margin-top: 24px; margin-bottom: 16px; border-top: 1px solid var(--border-color); padding-top: 16px;">
        <h3 style="font-size: 16px; color: var(--text-primary); margin-bottom: 12px; font-weight: 600;">Owner Details</h3>
        <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">Create a new owner account or assign to an existing one by their email.</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="ownerName">Owner Name</label>
        <input id="ownerName" placeholder="e.g. John Doe" class="form-input" />
      </div>

      <div class="form-group">
        <label class="form-label" for="ownerEmail">Owner Email</label>
        <input id="ownerEmail" type="email" placeholder="e.g. john@example.com" class="form-input" />
      </div>

      <div class="form-group">
        <label class="form-label" for="ownerPassword">Initial Password</label>
        <div class="password-group">
          <input id="ownerPassword" type="password" placeholder="Set a temporary password" class="form-input" />
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('ownerPassword')" title="Toggle Password Visibility">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button id="addBtn" onclick="addVehicle()" class="btn btn-primary btn-full" style="margin-top: 8px;">
        Register Vehicle
      </button>
    </div>

  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "login.html";
  }

  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast ' + type + ' show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function togglePasswordVisibility(inputId) {
    const input = document.getElementById(inputId);
    const btn = input.nextElementSibling;
    if (input.type === 'password') {
      input.type = 'text';
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
    } else {
      input.type = 'password';
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
    }
  }

  async function addVehicle() {
    const vehicleNumber = document.getElementById("vehicleNumber").value.trim();
    const model = document.getElementById("model").value.trim();
    const year = document.getElementById("year").value;
    const mileage = document.getElementById("mileage").value;
    const ownerName = document.getElementById("ownerName").value.trim();
    const ownerEmail = document.getElementById("ownerEmail").value.trim();
    const ownerPassword = document.getElementById("ownerPassword").value.trim();
    const btn = document.getElementById("addBtn");

    if (!vehicleNumber || !model || !year || !mileage || !ownerName || !ownerEmail || !ownerPassword) {
      showToast("All fields are required", "error");
      return;
    }

    btn.textContent = "Registering...";
    btn.disabled = true;

    try {
      const response = await fetch("/api/vehicles", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ 
          vehicleNumber, model, year: Number(year), mileage: Number(mileage),
          ownerName, ownerEmail, ownerPassword 
        })
      });

      const data = await response.json();

      if (!response.ok) {
        showToast(data.message || "Failed to add vehicle", "error");
        btn.textContent = "Register Vehicle";
        btn.disabled = false;
        return;
      }

      showToast("Vehicle registered successfully!");

      // Reset form
      setTimeout(() => {
        document.getElementById("vehicleNumber").value = "";
        document.getElementById("model").value = "";
        document.getElementById("year").value = "";
        document.getElementById("mileage").value = "";
        document.getElementById("ownerName").value = "";
        document.getElementById("ownerEmail").value = "";
        document.getElementById("ownerPassword").value = "";
        btn.textContent = "Register Vehicle";
        btn.disabled = false;
      }, 1000);

    } catch (err) {
      showToast("Server error", "error");
      btn.textContent = "Register Vehicle";
      btn.disabled = false;
      console.error(err);
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addVehicle();
  });
</script>

</body>
</html>
