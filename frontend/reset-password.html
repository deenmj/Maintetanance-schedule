<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ABC Fleet Maintenance</title>
  <meta name="description" content="Set a new password for your ABC Fleet Maintenance account" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
<div class="page-wrapper center-page">

  <div class="card auth-card">

    <!-- Header -->
    <div class="card-header" style="flex-direction: column; text-align: center; gap: 16px;">
      <div class="auth-logo">🔄</div>
      <div>
        <div class="auth-title">Reset Password</div>
        <div class="auth-subtitle">Choose a new secure password</div>
      </div>
    </div>

    <!-- New Password -->
    <div class="form-group">
      <label class="form-label" for="newPassword">New Password</label>
      <div class="password-group">
        <input id="newPassword" type="password" placeholder="Enter new password" class="form-input" />
        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('newPassword')" title="Toggle Password Visibility">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label class="form-label" for="confirmPassword">Confirm New Password</label>
      <div class="password-group">
        <input id="confirmPassword" type="password" placeholder="Confirm new password" class="form-input" />
        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirmPassword')" title="Toggle Password Visibility">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
      </div>
    </div>

    <!-- Reset Button -->
    <button id="reset-btn" onclick="resetPassword()" class="btn btn-primary btn-full">
      Update Password
    </button>

    <div style="margin-top: 20px; text-align: center;">
      <a href="login.html" class="link text-sm">Return to Login</a>
    </div>

  </div>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
  // Get token from URL
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  if (!token) {
    alert("Invalid reset link. Redirecting to login...");
    window.location.href = "login.html";
  }

  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast ' + type + ' show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function togglePasswordVisibility(inputId) {
    const input = document.getElementById(inputId);
    const btn = input.nextElementSibling;
    if (input.type === 'password') {
      input.type = 'text';
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
    } else {
      input.type = 'password';
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
    }
  }

  async function resetPassword() {
    const password = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;
    const btn = document.getElementById("reset-btn");

    if (!password || !confirm) {
      showToast("Please fill in all fields", "error");
      return;
    }

    if (password !== confirm) {
      showToast("Passwords do not match", "error");
      return;
    }

    btn.textContent = "Updating...";
    btn.disabled = true;

    try {
      const response = await fetch(`/api/auth/reset-password/${token}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
      });

      const data = await response.json();

      if (!response.ok) {
        showToast(data.message || "Reset failed", "error");
        btn.textContent = "Update Password";
        btn.disabled = false;
        return;
      }

      showToast("Password updated successfully! Redirecting...");
      btn.textContent = "Success ✓";
      
      setTimeout(() => {
        window.location.href = "login.html";
      }, 2000);

    } catch (err) {
      showToast("Server error. Please try again.", "error");
      btn.textContent = "Update Password";
      btn.disabled = false;
      console.error(err);
    }
  }
</script>

</body>
</html>
