<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ABC Fleet Maintenance</title>
  <meta name="description" content="Login to ABC Rent A Car Vehicle Maintenance System" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
<div class="page-wrapper center-page">

  <div class="card auth-card">

    <!-- Header -->
    <div class="card-header" style="flex-direction: column; text-align: center; gap: 16px;">
      <div class="auth-logo">🔧</div>
      <div>
        <div class="auth-title">Welcome Back</div>
        <div class="auth-subtitle">Sign in to ABC Fleet Maintenance</div>
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input id="email" type="email" placeholder="you@example.com" class="form-input" />
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input id="password" type="password" placeholder="Enter your password" class="form-input" />
    </div>

    <!-- Login Button -->
    <button id="login-btn" onclick="loginUser()" class="btn btn-primary btn-full">
      Sign In
    </button>

    <!-- Register link -->
    <p class="text-center text-sm mt-24" style="color: var(--text-muted);">
      Don't have an account?
      <a href="register.html" class="link">Create one</a>
    </p>

    <!-- Demo credentials hint -->
    <div style="margin-top: 20px; padding: 14px; background: rgba(56, 189, 248, 0.06); border: 1px solid rgba(56, 189, 248, 0.15); border-radius: var(--radius-sm); text-align: center;">
      <div style="font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;">Demo Accounts</div>
      <div style="font-size: 13px; color: var(--text-secondary);">
        <strong style="color: var(--accent-blue);">Owner:</strong> ahmed@abc.com / pass123<br/>
        <strong style="color: var(--accent-emerald);">Mechanic:</strong> ravi@abc.com / pass123
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast ' + type + ' show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  async function loginUser() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("login-btn");

    if (!email || !password) {
      showToast("Please enter email and password", "error");
      return;
    }

    btn.textContent = "Signing in...";
    btn.disabled = true;

    try {
      const response = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (!response.ok) {
        showToast(data.message || "Login failed", "error");
        btn.textContent = "Sign In";
        btn.disabled = false;
        return;
      }

      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data.user));

      showToast("Welcome back, " + data.user.name + "!");

      setTimeout(() => {
        if (data.user.role === "mechanic") {
          window.location.href = "mechanic-dashboard.html";
        } else {
          window.location.href = "dashboard_owner.html";
        }
      }, 800);

    } catch (err) {
      showToast("Server error. Please try again.", "error");
      btn.textContent = "Sign In";
      btn.disabled = false;
      console.error(err);
    }
  }

  // Enter key support
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loginUser();
  });
</script>

</body>
</html>
