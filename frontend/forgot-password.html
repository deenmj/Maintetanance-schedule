<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — ABC Fleet Maintenance</title>
  <meta name="description" content="Reset your ABC Fleet Maintenance password" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
<div class="page-wrapper center-page">

  <div class="card auth-card">

    <!-- Header -->
    <div class="card-header" style="flex-direction: column; text-align: center; gap: 16px;">
      <div class="auth-logo">🔑</div>
      <div>
        <div class="auth-title">Forgot Password</div>
        <div class="auth-subtitle">Enter your email to receive a reset link</div>
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input id="email" type="email" placeholder="you@example.com" class="form-input" />
    </div>

    <!-- Reset Button -->
    <button id="reset-btn" onclick="requestReset()" class="btn btn-primary btn-full">
      Send Reset Link
    </button>

    <div style="margin-top: 20px; text-align: center;">
      <a href="login.html" class="link text-sm">← Back to Login</a>
    </div>

    <!-- Help text -->
    <div style="margin-top: 24px; padding: 14px; background: rgba(167, 139, 250, 0.06); border: 1px solid rgba(167, 139, 250, 0.15); border-radius: var(--radius-sm); text-align: center;">
       <div style="font-size: 13px; color: var(--text-secondary);">
         We will send a secure link to your registered email address to reset your password.
       </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast ' + type + ' show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  async function requestReset() {
    const email = document.getElementById("email").value.trim();
    const btn = document.getElementById("reset-btn");

    if (!email) {
      showToast("Please enter your email", "error");
      return;
    }

    btn.textContent = "Sending...";
    btn.disabled = true;

    try {
      const response = await fetch("/api/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });

      const data = await response.json();

      if (!response.ok) {
        showToast(data.message || "Failed to send reset link", "error");
        btn.textContent = "Send Reset Link";
        btn.disabled = false;
        return;
      }

      showToast(data.message || "Reset link sent to your email!");
      btn.textContent = "Email Sent ✓";
      
      // Auto-focus back to login after a delay
      setTimeout(() => {
        window.location.href = "login.html";
      }, 4000);

    } catch (err) {
      showToast("Server error. Please try again.", "error");
      btn.textContent = "Send Reset Link";
      btn.disabled = false;
      console.error(err);
    }
  }

  // Enter key support
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') requestReset();
  });
</script>

</body>
</html>
