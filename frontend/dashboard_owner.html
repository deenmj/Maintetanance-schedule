<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Dashboard — ABC Fleet Maintenance</title>
  <meta name="description" content="Vehicle owner dashboard for monitoring maintenance status and service history" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
<div class="page-wrapper">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="navbar-logo">A</div>
      <div>
        <div class="navbar-title">ABC Fleet Maintenance</div>
        <div class="navbar-subtitle">Owner Dashboard</div>
      </div>
    </div>
    <div class="navbar-actions">
      <div class="navbar-user">
        <div class="navbar-avatar" id="avatar">—</div>
        <span class="navbar-user-name" id="userName">—</span>
      </div>
      <button onclick="logout()" class="btn btn-danger">Logout</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="container" style="padding-top: 32px; padding-bottom: 80px;">

    <!-- Page Title -->
    <div class="animate-in" style="margin-bottom: 32px;">
      <h1 style="font-size: 28px; font-weight: 800; color: var(--text-primary);">Vehicle Status</h1>
      <p style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Monitor your fleet's maintenance health in real time</p>
    </div>

    <!-- VEHICLE LOOKUP -->
    <div class="card animate-in animate-in-delay-1" style="margin-bottom: 28px;">
      <div class="card-header">
        <div class="card-icon blue">🔍</div>
        <div>
          <div class="card-title">Vehicle Lookup</div>
          <div class="card-description">Enter a vehicle number and current mileage to check status</div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 16px; align-items: end;">
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label" for="vehicleNumber">Vehicle Number</label>
          <input id="vehicleNumber" placeholder="e.g. BGT 2987" class="form-input" />
        </div>

        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label" for="currentMileage">Current Mileage (KM)</label>
          <input id="currentMileage" type="number" placeholder="e.g. 52000" class="form-input" />
        </div>

        <button id="lookupBtn" onclick="loadVehicleStatus()" class="btn btn-primary" style="height: 44px;">
          Check Status
        </button>
      </div>
    </div>

    <!-- STATS (populated dynamically) -->
    <div id="statsGrid" class="stats-grid" style="display: none;"></div>

    <!-- ALERTS -->
    <div id="alertsSection" style="display: none;" class="animate-in">
      <div class="section-header">
        <span class="icon">🚨</span>
        <h2>Maintenance Alerts</h2>
      </div>
      <div id="alerts" class="space-y"></div>
    </div>

    <!-- SERVICE HISTORY -->
    <div id="historySection" style="display: none; margin-top: 32px;" class="animate-in">
      <div class="section-header">
        <span class="icon">📋</span>
        <h2>Service History</h2>
      </div>
      <div id="history" class="space-y"></div>
    </div>

  </div>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
  /* ── AUTH CHECK ── */
  const token = localStorage.getItem("token");
  const user = JSON.parse(localStorage.getItem("user") || "{}");

  if (!token) {
    window.location.href = "login.html";
  }

  /* Populate user info */
  if (user.name) {
    document.getElementById("userName").textContent = user.name;
    document.getElementById("avatar").textContent = user.name.charAt(0).toUpperCase();
  }

  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast ' + type + ' show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  /* ── LOAD VEHICLE STATUS ── */
  async function loadVehicleStatus() {
    const vehicleNumber = document.getElementById("vehicleNumber").value.trim();
    const currentMileage = Number(document.getElementById("currentMileage").value);
    const btn = document.getElementById("lookupBtn");

    const alertsDiv = document.getElementById("alerts");
    const historyDiv = document.getElementById("history");
    const statsGrid = document.getElementById("statsGrid");

    alertsDiv.innerHTML = "";
    historyDiv.innerHTML = "";

    if (!vehicleNumber || !currentMileage) {
      showToast("Enter vehicle number and current mileage", "error");
      return;
    }

    btn.textContent = "Loading...";
    btn.disabled = true;

    try {
      const res = await fetch(
        `/api/services/${vehicleNumber}`,
        { headers: { Authorization: "Bearer " + token } }
      );

      const services = await res.json();

      if (!services.length) {
        document.getElementById("alertsSection").style.display = "none";
        document.getElementById("historySection").style.display = "block";
        statsGrid.style.display = "none";
        historyDiv.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <p>No service records found for <strong>${vehicleNumber}</strong></p>
          </div>
        `;
        btn.textContent = "Check Status";
        btn.disabled = false;
        return;
      }

      /* ── STATS ── */
      const latestService = services[0];
      let overdueCount = 0;
      let soonCount = 0;
      let okCount = 0;

      latestService.items.forEach(item => {
        const remaining = item.nextCheckKm - currentMileage;
        if (remaining < 0) overdueCount++;
        else if (remaining <= 1000) soonCount++;
        else okCount++;
      });

      statsGrid.style.display = "grid";
      statsGrid.innerHTML = `
        <div class="stat-card">
          <div class="stat-value">${services.length}</div>
          <div class="stat-label">Total Services</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="background: var(--gradient-success); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${okCount}</div>
          <div class="stat-label">On Track</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="background: var(--gradient-warm); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${soonCount}</div>
          <div class="stat-label">Due Soon</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="background: var(--gradient-danger); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${overdueCount}</div>
          <div class="stat-label">Overdue</div>
        </div>
      `;

      /* ── ALERTS ── */
      document.getElementById("alertsSection").style.display = "block";

      latestService.items.forEach(item => {
        const remainingKm = item.nextCheckKm - currentMileage;
        let alertClass, alertIcon, message;

        if (remainingKm < 0) {
          alertClass = "danger";
          alertIcon = "🔴";
          message = `Overdue by ${Math.abs(remainingKm).toLocaleString()} km`;
        } else if (remainingKm <= 1000) {
          alertClass = "warning";
          alertIcon = "🟡";
          message = `Due in ${remainingKm.toLocaleString()} km`;
        } else {
          alertClass = "success";
          alertIcon = "🟢";
          message = `On track — next in ${remainingKm.toLocaleString()} km`;
        }

        alertsDiv.innerHTML += `
          <div class="alert-box ${alertClass}">
            <span class="alert-icon">${alertIcon}</span>
            <div class="alert-content">
              <div class="alert-title">${item.component}</div>
              <div class="alert-meta">${message} · Scheduled at ${item.nextCheckKm.toLocaleString()} km</div>
            </div>
          </div>
        `;
      });

      /* ── SERVICE HISTORY ── */
      document.getElementById("historySection").style.display = "block";

      services.forEach(service => {
        let itemsHtml = "";
        service.items.forEach(i => {
          itemsHtml += `<li><strong>${i.component}</strong> — ${i.action} (Next: ${i.nextCheckKm.toLocaleString()} km)</li>`;
        });

        historyDiv.innerHTML += `
          <div class="history-card">
            <div class="history-header">
              <span class="history-date">📅 ${new Date(service.serviceDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</span>
              <span class="history-mileage">${service.mileageAtService.toLocaleString()} km</span>
            </div>
            <ul class="history-items">${itemsHtml}</ul>
          </div>
        `;
      });

    } catch (err) {
      console.error(err);
      showToast("Failed to load vehicle data", "error");
    }

    btn.textContent = "Check Status";
    btn.disabled = false;
  }

  /* ── LOGOUT ── */
  function logout() {
    localStorage.clear();
    window.location.href = "login.html";
  }
</script>

</body>
</html>
